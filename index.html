const POPUP_URL = 'https://www.elektrotechnik-matt.de/elektroniker-fuer-energie-und-gebaeudetechnik-m-w-d/';

function schedulePopup() {
  if (popupTimer) clearTimeout(popupTimer);
  popupShown = false;
  const delay = 25000 + Math.random() * 375000; // 25-400 Sekunden
  popupTimer = setTimeout(() => {
    const isPlaying = mpMode === 'viewer'
      ? !!(mpViewerState && mpViewerState.phase === 'playing')
      : state.phase === 'playing';
    if (!popupShown && isPlaying) showAdPopup();
  }, delay);
}

function showAdPopup() {
  popupShown = true;
  if (document.getElementById('ad-popup')) return;
  const overlay = document.createElement('div');
  overlay.id = 'ad-popup';
  overlay.className = 'popup-overlay';
  overlay.innerHTML = `
    <div class="popup-card">
      <a href="${POPUP_URL}" target="_blank" rel="noopener" class="popup-link">
        <img src="${POPUP_IMG}" class="popup-img" alt="Elektrotechnik Matt – Jetzt bewerben">
        <div class="popup-caption">
          <span class="popup-brand">Elektrotechnik Matt GmbH</span>
          <span class="popup-cta">Jetzt bewerben →</span>
        </div>
      </a>
      <button class="popup-close" aria-label="Schließen" onclick="document.getElementById('ad-popup').remove()">×</button>
    </div>
  `;
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.remove();
  });
  document.body.appendChild(overlay);
}

function applyTheme() {
  const isLight = state.theme === 'light';
  document.documentElement.classList.toggle('light', isLight);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', isLight ? '#f7f5f4' : '#0a0a0a');
}

function render() {
  applyTheme();
  if (mpMode === 'viewer') { renderViewer(); return; }
  const active = document.activeElement;
  const prevFocusId = active && active.dataset ? active.dataset.focusId : null;
  const isNameField = prevFocusId && prevFocusId.indexOf('name') === 0;
  const selStart = isNameField && active.selectionStart != null ? active.selectionStart : null;
  const selEnd = isNameField && active.selectionEnd != null ? active.selectionEnd : null;
  const screen = state.phase + ':' + (state.subPhase || '');
  const screenChanged = screen !== lastScreen;
  lastScreen = screen;
  if (screenChanged) {
    try { window.scrollTo({ top: 0, left: 0, behavior: 'auto' }); } catch (e) { window.scrollTo(0, 0); }
  }
  maybeAnnounceForbidden();
  maybeAnnouncePlay();
  maybeAnnounceNextRound();
  pushToFirebase();
  const app = document.getElementById('app');
  app.className = 'app' + (state.compact ? ' compact' : '');
  app.innerHTML = '';
  const layout = el('div', { class: 'layout' });
  layout.appendChild(renderSidebar());
  const main = el('div', { class: 'main' });
  if (state.phase === 'setup') main.appendChild(renderSetup());
  else if (state.phase === 'playing') {
    if (state.subPhase === 'predict') main.appendChild(renderPredict());
    else if (state.subPhase === 'play') main.appendChild(renderPlay());
    else if (state.subPhase === 'results') main.appendChild(renderResults());
    else if (state.subPhase === 'summary') main.appendChild(renderSummary());
  } else if (state.phase === 'gameEnd') main.appendChild(renderGameEnd());
  layout.appendChild(main);
  app.appendChild(layout);

  // pendingFocus hat Vorrang (gezieltes Weiterspringen)
  if (pendingFocus) {
    const pf = pendingFocus; pendingFocus = null;
    const target = pf === '__commit__' ? app.querySelector('[data-commit]') : app.querySelector(`[data-focus-id="${pf}"]`);
    if (target && !target.disabled) { try { target.focus({ preventScroll: true }); } catch (e) { target.focus(); } if (target.tagName === 'INPUT') target.select(); return; }
  }
  // Fokus auf vorheriges Feld zurücksetzen
  if (prevFocusId) {
    const restore = app.querySelector(`[data-focus-id="${prevFocusId}"]`);
    if (restore) {
      try { restore.focus({ preventScroll: true }); } catch (e) { restore.focus(); }
      if (restore.tagName === 'INPUT') {
        if (isNameField && selStart != null) { try { restore.setSelectionRange(selStart, selEnd); } catch (e) {} }
        else restore.select();
      }
      return;
    }
  }
  // Einmaliger Start-Fokus auf erstes Namensfeld
  if (initialFocusPending) {
    initialFocusPending = false;
    const init = app.querySelector('[data-init-focus]');
    if (init) { try { init.focus({ preventScroll: true }); } catch (e) { init.focus(); } return; }
  }
  // Fokus auf erstes Feld nur beim Betreten des Bildschirms
  if (screenChanged) {
    const enter = app.querySelector('[data-enter-focus]');
    if (enter) { try { enter.focus({ preventScroll: true }); } catch (e) { enter.focus(); } if (enter.tagName === 'INPUT') enter.select(); return; }
  }
  const auto = app.querySelector('[data-autofocus]');
  if (auto) { try { auto.focus({ preventScroll: true }); } catch (e) { auto.focus(); } if (auto.tagName === 'INPUT') auto.select(); }
}

// Global keyboard
document.addEventListener('keydown', e => {
  const t = e.target;
  const isInput = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA');
  const isButton = t && t.tagName === 'BUTTON';
  const fid = t && t.dataset ? t.dataset.focusId : null;
  if (e.key === 'Enter' && state.phase === 'playing' && state.subPhase === 'summary' && !isInput && !isButton) { e.preventDefault(); nextRound(); return; }
  if (e.key === 'Enter' && state.phase === 'playing' && state.subPhase === 'play' && !isInput && !isButton) { e.preventDefault(); goToResults(); return; }
  if (e.key === 'ArrowLeft') {
    if (fid && fid.indexOf('name') === 0) return;
    if (fid === 'predict' && t.value !== '') return;
    if (state.phase === 'playing') { e.preventDefault(); goBack(); }
  }
});

// ─── BILDSCHIRM WACHHALTEN (Wake Lock) ──────────────────────────────────────
// Verhindert, dass das Display während der Nutzung der App abgedunkelt/gesperrt wird.
// Wird vom System automatisch aufgehoben, sobald die Seite in den Hintergrund geht –
// daher bei Rückkehr in den Vordergrund erneut anfordern.
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) { wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
requestWakeLock();

// Host-Session nach Reload/PWA-Neustart wiederherstellen: sonst hängt das
// Spiel für alle Mitspieler fest, weil der Host sonst keinen Kontakt mehr
// zum bisherigen Raum hätte (siehe attachHostToRoom()).
let hostResumed = false;
try {
  const savedHost = localStorage.getItem('mpHost');
  if (savedHost && firebaseReady() && initFirebase()) {
    const { room } = JSON.parse(savedHost);
    if (room) { attachHostToRoom(room); hostResumed = true; }
  }
} catch (e) {
  // Den gemerkten Raumcode NICHT löschen – ein einmaliger, vorübergehender
  // Fehler (z.B. Firebase noch nicht ganz bereit) soll nicht dazu führen,
  // dass man beim nächsten Reload endgültig ausgesperrt bleibt.
  console.error('Host-Session konnte nicht wiederherstellt werden:', e);
}

if (hostResumed) {
  render();
} else {
  // Viewer-Session nach Reload wiederherstellen
  try {
    const saved = sessionStorage.getItem('mpViewer');
    if (saved) {
      const { room, playerId } = JSON.parse(saved);
      if (room && firebaseReady()) {
        if (playerId != null) mpViewerPlayerId = playerId;
        joinRoom(room);
      } else {
        sessionStorage.removeItem('mpViewer');
        render();
      }
    } else {
      render();
    }
  } catch (e) {
    sessionStorage.removeItem('mpViewer');
    render();
  }
}
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => {
        // Wenn ein neuer SW wartet, sofort aktivieren
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (newWorker) {
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          }
        });
      })
      .catch(e => console.log('SW Registrierung fehlgeschlagen:', e));
    // Bei SW-Wechsel Seite neu laden
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) { refreshing = true; window.location.reload(); }
    });
  });
}
</script>
